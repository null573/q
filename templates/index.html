<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>销售订单排队系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div id="authOverlay" class="auth-overlay" style="display:none;">
        <div class="auth-box">
            <div class="auth-icon">🔒</div>
            <h2>需要授权访问</h2>
            <p>本系统仅限授权用户使用</p>
            <p class="auth-hint">请输入您的微信名</p>
            <div class="auth-form">
                <input type="text" id="authWechatName" placeholder="请输入微信名" onkeydown="if(event.key==='Enter')doAuth()">
                <button onclick="doAuth()">登 录</button>
            </div>
            <p class="auth-error" id="authError"></p>
        </div>
    </div>

    <div class="container">
        <header class="header">
            <h1>销售订单排队系统</h1>
            <div class="user-info">
                <span id="userName">未登录</span>
            </div>
        </header>

        <nav class="nav-tabs">
            <button class="tab-btn active" onclick="showTab('create')">创建订单</button>
            <button class="tab-btn" onclick="showTab('list')">订单明细</button>
        </nav>

        <div id="createTab" class="tab-content active">
            <form id="orderForm" class="order-form">
                <div class="form-row">
                    <div class="form-group form-col">
                        <label for="model">型号 <span class="required">*</span></label>
                        <select id="model" name="model" required>
                            <option value="">请选择</option>
                        </select>
                    </div>
                    <div class="form-group form-col">
                        <label for="tonnage">吨位 <span class="required">*</span></label>
                        <input type="number" id="tonnage" name="tonnage" step="0.01" required placeholder="吨位">
                    </div>
                    <div class="form-group form-col">
                        <label for="customer">客户 <span class="required">*</span></label>
                        <input type="text" id="customer" name="customer" required placeholder="客户">
                    </div>
                </div>

                <div class="form-group">
                    <label for="expectedDate">期望发货日期 <span class="required">*</span></label>
                    <input type="date" id="expectedDate" name="expectedDate" required>
                </div>

                <div class="form-group">
                    <label for="calculatedDate">可发货日期</label>
                    <input type="text" id="calculatedDate" name="calculatedDate" readonly placeholder="填写上方信息后自动计算">
                </div>

                <div class="form-group">
                    <label for="queueDate">输入发货日期排队 <span class="required">*</span></label>
                    <input type="date" id="queueDate" name="queueDate" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">提交订单</button>
                    <button type="reset" class="btn-reset">重置</button>
                </div>
            </form>
        </div>

        <div id="listTab" class="tab-content">
            <div class="filter-bar">
                <input type="text" id="filterInput" placeholder="筛选订单..." oninput="filterOrders()">
                <select id="sortSelect" onchange="sortOrders()">
                    <option value="">默认排序</option>
                    <option value="model">按型号排序</option>
                    <option value="queueDate">按排队日期排序</option>
                    <option value="tonnage">按吨位排序</option>
                </select>
            </div>
            
            <div id="ordersList" class="orders-list">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>修改订单</h2>
                <span class="close" onclick="closeEditModal()">&times;</span>
            </div>
            <form id="editForm" class="order-form">
                <input type="hidden" id="editRowIndex">
                <div class="form-row">
                    <div class="form-group form-col">
                        <label for="editModel">型号</label>
                        <select id="editModel" name="editModel" required>
                            <option value="">请选择</option>
                        </select>
                    </div>
                    <div class="form-group form-col">
                        <label for="editTonnage">吨位</label>
                        <input type="number" id="editTonnage" name="editTonnage" step="0.01" required placeholder="吨位">
                    </div>
                    <div class="form-group form-col">
                        <label for="editCustomer">客户</label>
                        <input type="text" id="editCustomer" name="editCustomer" required placeholder="客户">
                    </div>
                </div>

                <div class="form-group">
                    <label for="editExpectedDate">期望发货日期</label>
                    <input type="date" id="editExpectedDate" name="editExpectedDate" required>
                </div>

                <div class="form-group">
                    <label for="editCalculatedDate">可发货日期</label>
                    <input type="text" id="editCalculatedDate" name="editCalculatedDate" readonly placeholder="修改上方信息后自动计算">
                </div>

                <div class="form-group">
                    <label for="editQueueDate">输入发货日期排队</label>
                    <input type="date" id="editQueueDate" name="editQueueDate" required>
                    <div class="date-hint" id="editDateHint"></div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">保存修改</button>
                    <button type="button" class="btn-cancel" onclick="closeEditModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
